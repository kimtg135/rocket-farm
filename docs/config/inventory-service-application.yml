spring:
  application:
    name: inventory-service
  datasource:
    hikari:
      # 단순 조회 중심 서비스 — 재고 조회, Redis 캐시 우선
      # 트러블슈팅 #4: 기본값(10) → 3으로 조정
      # 근거: maxReplicas(35) × pool(3) = 105 connections, db.r6g.xlarge max(2,000) 내 여유 확보
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 5000
      max-lifetime: 1800000
      keepalive-time: 600000
