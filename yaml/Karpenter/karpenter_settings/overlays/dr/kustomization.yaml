apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Tokyo (DR) 리전 전용 설정
patches:
  # EC2NodeClass: 공통 설정 (Role, Subnet/SG 셀렉터, Tags, EBS KMS)
  - target:
      kind: EC2NodeClass
    patch: |-
      - op: replace
        path: /spec/role
        value: "rocket-farm-dr-node-role"
      - op: replace
        path: /spec/subnetSelectorTerms/0/tags/karpenter~1eks-cluster
        value: "rocket-farm-dr"
      - op: replace
        path: /spec/securityGroupSelectorTerms/0/tags/karpenter~1eks-cluster
        value: "rocket-farm-dr"
      - op: replace
        path: /spec/tags/karpenter~1eks-cluster
        value: "rocket-farm-dr"
      - op: replace
        path: /spec/blockDeviceMappings/0/ebs/kmsKeyID
        value: "alias/rocket-farm-dr-dr-kms"

  # EC2NodeClass: 개별 Name 태그 패치
  - target:
      kind: EC2NodeClass
      name: app
    patch: |-
      - op: replace
        path: /spec/tags/Name
        value: "rocket-farm-dr-app-node-karpenter"
  - target:
      kind: EC2NodeClass
      name: management
    patch: |-
      - op: replace
        path: /spec/tags/Name
        value: "rocket-farm-dr-management-node-karpenter"
  - target:
      kind: EC2NodeClass
      name: monitoring
    patch: |-
      - op: replace
        path: /spec/tags/Name
        value: "rocket-farm-dr-monitoring-node-karpenter"

  # NodePool: 가용 영역(AZ) 패치 (requirements/3: topology.kubernetes.io/zone)
  - target:
      kind: NodePool
    patch: |-
      - op: replace
        path: /spec/template/spec/requirements/3/values
        value: ["ap-northeast-1a", "ap-northeast-1c"]

  # NodePool: DR(Warm-Standby) App 전용 패치
  # 1. instance-size를 2xlarge로 고정
  #    → Standby Pod 전체(~6 core, ~8Gi)가 c5.2xlarge 1대에 수용
  #    → 리소스 요청 증가 시에도 Karpenter가 동일 사이즈 추가 → 불필요한 소형 노드 방지
  # 2. limits: cpu 80 (c5.2xlarge 약 10대) → Failover 시 KEDA 스케일아웃 허용
  - target:
      kind: NodePool
      name: app
    patch: |-
      - op: add
        path: /spec/template/spec/requirements/-
        value:
          key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["2xlarge"]
      - op: replace
        path: /spec/limits/cpu
        value: "80"
      - op: replace
        path: /spec/limits/memory
        value: "160Gi"

  # SecretStore: AWS 리전 패치
  - target:
      kind: SecretStore
      name: karpenter-parameterstore
    patch: |-
      - op: replace
        path: /spec/provider/aws/region
        value: "ap-northeast-1"

  # ExternalSecret: SSM 파라미터 경로 패치
  - target:
      kind: ExternalSecret
      name: karpenter-values
    patch: |-
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: "/rocket-farm/dr/eks/endpoint"
