# Monitoring 노드 EC2NodeClass - 모니터링 컴포넌트용 노드 하드웨어 스펙
# 특징:
#   - AL2023 AMI 기반, 20Gi gp3 EBS (암호화 활성화)
#   - IMDSv2 필수 (httpTokens: required)
#   - 태그 기반 서브넷/보안그룹 자동 선택
#   - monitoring NodePool과 함께 사용 (taint: role=monitoring)
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2" # EC2NodeClass가 NodePool보다 먼저 생성되어야 함
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest

  # 태그 기반으로 Karpenter 전용 서브넷 자동 선택
  subnetSelectorTerms:
    - tags:
        karpenter/eks-cluster: REPLACE_ME # 환경별 overlay에서 patch
        karpenter/karpenter-tag: karpenter

  # 태그 기반으로 Karpenter 전용 보안그룹 자동 선택
  securityGroupSelectorTerms:
    - tags:
        karpenter/eks-cluster: REPLACE_ME # 환경별 overlay에서 patch
        karpenter/karpenter-tag: karpenter

  role: "REPLACE_ME" # 환경별 overlay에서 patch

  # EC2 인스턴스에 부여할 태그 (비용 추적 및 식별용)
  tags:
    karpenter/eks-cluster: REPLACE_ME # 환경별 overlay에서 patch
    karpenter/karpenter-tag: karpenter
    Name: REPLACE_ME # 환경별 overlay에서 patch

  # 루트 볼륨 설정
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true
        kmsKeyID: "REPLACE_ME" # kustomize replacements로 주입
        deleteOnTermination: true

  # IMDSv2 필수 적용 (보안 강화)
  metadataOptions:
    httpEndpoint: enabled
    httpPutResponseHopLimit: 2
    httpTokens: required
